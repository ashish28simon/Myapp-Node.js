name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: HP
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd Myapp-Node.js
            ./deploy.sh
