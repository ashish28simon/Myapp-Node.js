<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #141414;
    color: white;
}

header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

.logo {
    color: #e50914;
    font-size: 28px;
    font-weight: bold;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-size: 14px;
}

.hero {
    height: 90vh;
    background: url('https://picsum.photos/1600/900?blur=2') no-repeat center center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 50px;
}

.hero h1 {
    font-size: 50px;
    margin-bottom: 20px;
}

.hero p {
    max-width: 500px;
    font-size: 18px;
    margin-bottom: 20px;
}

.btn {
    background-color: #e50914;
    border: none;
    padding: 10px 20px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
}

.row {
    margin: 40px 50px;
}

.row h2 {
    margin-bottom: 10px;
}

.movies {
    display: flex;
    overflow-x: auto;
}

.movie {
    min-width: 200px;
    margin-right: 10px;
    transition: transform 0.3s;
}

.movie img {
    width: 100%;
    border-radius: 4px;
}

.movie:hover {
    transform: scale(1.08);
}
</style>

</head>
<body>

<header>
    <div class="logo">StreamFlix</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">TV Shows</a>
        <a href="#">Movies</a>
        <a href="#">My List</a>
    </nav>
</header>

<section class="hero">
    <h1>Unlimited Movies, OTT Shows, and More</h1>
    <p>Watch anywhere. Cancel anytime. Ready to watch? Click below to start streaming.</p>
    <button class="btn">Watch Now</button>
</section>

<div class="row">
    <h2>Trending Now</h2>
    <div class="movies">
        <div class="movie"><img src="https://picsum.photos/200/300?random=1"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=2"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=3"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=4"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=5"></div>
    </div>
</div>

<div class="row">
    <h2>Top Picks For You</h2>
    <div class="movies">
        <div class="movie"><img src="https://picsum.photos/200/300?random=6"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=7"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=8"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=9"></div>
        <div class="movie"><img src="https://picsum.photos/200/300?random=10"></div>
    </div>
</div>

</body>
</html>
